<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini SOC Platform</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.1);
            --warning: #f59e0b;
            --warning-bg: rgba(245, 158, 11, 0.1);
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
            --border: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }

        .sidebar h2 {
            padding: 0 20px;
            font-size: 1.25rem;
            color: var(--text-primary);
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .sidebar h2 span {
            color: var(--accent);
        }

        .nav-link {
            padding: 12px 20px;
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-link:hover {
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            border-left: 4px solid var(--accent);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .header {
            background-color: var(--card-bg);
            padding: 20px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content {
            padding: 30px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin-bottom: 24px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        h1, h2, h3 { margin-top: 0; }

        .btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover { background-color: var(--accent-hover); }
        .btn.danger { background-color: var(--danger); }
        .btn.danger:hover { background-color: #dc2626; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            text-align: left;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        tr:hover { background-color: rgba(255, 255, 255, 0.02); }

        .badge {
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge.critical { background-color: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger); }
        .badge.high { background-color: var(--danger-bg); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
        .badge.medium { background-color: var(--warning-bg); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
        .badge.low { background-color: var(--success-bg); color: var(--success); border: 1px solid rgba(16,185,129,0.3);}
        
        input, select, textarea {
            width: 100%;
            padding: 10px;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 6px;
            font-family: inherit;
            margin-bottom: 15px;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Mini <span>SOC</span></h2>
        <a href="{% url 'dashboard_index' %}" class="nav-link">Dashboard</a>
        <a href="{% url 'logs_index' %}" class="nav-link">Log Management</a>
        <a href="{% url 'detection_index' %}" class="nav-link">Detection Engine</a>
        <a href="{% url 'alerts_index' %}" class="nav-link">Alerts</a>
        <a href="{% url 'incidents_index' %}" class="nav-link">Incidents</a>
        <a href="{% url 'reports_index' %}" class="nav-link">Reports</a>
    </div>

    <div class="main-content">
        <div class="header">
            <h3>{% block page_title %}Overview{% endblock %}</h3>
            <div>
                User: {{ request.user.username }} | <a href="{% url 'admin:logout' %}?next=/" style="color: var(--accent);">Logout</a>
            </div>
        </div>
        <div class="content">
            {% block content %}
            {% endblock %}
        </div>
    </div>
    <script>
        let currentLogCount = null;
        setInterval(function() {
            // Backend polling for continuous reading and detection
            fetch("/detection/auto/")
                .then(response => response.json())
                .then(data => {
                    let shouldReload = false;
                    
                    if (data.new_alerts) {
                        shouldReload = true;
                    }
                    if (currentLogCount !== null && currentLogCount !== data.log_count) {
                        shouldReload = true;
                    }
                    
                    currentLogCount = data.log_count;
                    
                    // Frontend auto-refresh if there's a change
                    if (shouldReload) {
                        window.location.reload();
                    }
                })
                .catch(err => console.error('Error during auto-detect:', err));
        }, 5000); // 5 seconds interval
    </script>
</body>
</html>
